name: Actualizar EstadĂ­sticas (Noche)

on:
  schedule:
    # Se ejecuta todos los dĂ­as a las 12 de la noche (00:00 UTC)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Crear carpeta para las imĂ¡genes
        run: mkdir -p stats-images

      - name: Descargar imĂ¡genes de forma segura
        run: |
          # Variables de diseĂ±o
          BG_COLOR="0D1117"
          TITLE_COLOR="58A6FF"
          TEXT_COLOR="C9D1D9"
          ICON_COLOR="58A6FF"
          THEME="tokyonight"
          
          echo "Descargando EstadĂ­sticas Generales..."
          curl -L --fail -o stats-images/general-stats.svg "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=${THEME}&hide_border=true&bg_color=${BG_COLOR}&title_color=${TITLE_COLOR}&icon_color=${ICON_COLOR}&text_color=${TEXT_COLOR}" || echo "La API fallĂ³, se mantiene la imagen anterior."
          
          # Pausa de 3 segundos para evitar ser bloqueados por la API (Rate Limit)
          sleep 3
          
          echo "Descargando Lenguajes mĂ¡s usados..."
          curl -L --fail -o stats-images/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&theme=${THEME}&hide_border=true&bg_color=${BG_COLOR}&title_color=${TITLE_COLOR}&text_color=${TEXT_COLOR}" || echo "La API fallĂ³, se mantiene la imagen anterior."
          
          sleep 3
          
          echo "Descargando Racha de Commits..."
          curl -L --fail -o stats-images/streak-stats.svg "https://github-readme-streak-stats.herokuapp.com/?user=${{ github.repository_owner }}&theme=${THEME}&hide_border=true&background=${BG_COLOR}&stroke=${TITLE_COLOR}&ring=${TITLE_COLOR}&fire=FF6B6B&currStreakLabel=${TITLE_COLOR}&sideNums=${TEXT_COLOR}&sideLabels=${TEXT_COLOR}&dates=${TEXT_COLOR}" || echo "La API fallĂ³, se mantiene la imagen anterior."
          
          sleep 3
          
          echo "Descargando GrĂ¡fico de Actividad..."
          curl -L --fail -o stats-images/activity-graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=tokyo-night&hide_border=true&bg_color=${BG_COLOR}&color=${TITLE_COLOR}&line=${TITLE_COLOR}&point=FFFFFF" || echo "La API fallĂ³, se mantiene la imagen anterior."

      - name: Guardar imĂ¡genes en el repositorio
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualizar imĂ¡genes de estadĂ­sticas (EjecuciĂ³n nocturna)"
          file_pattern: "stats-images/*.svg"
          branch: master
