name: Actualizar Estadísticas en Push

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Crear carpeta para las imágenes
        run: mkdir -p stats-images

      - name: Descargar imágenes con estilos coherentes
        run: |
          # --- VARIABLES DE ESTILO COHERENTES ---
          # Extraídas directamente de tu Readme.md para mantener tu diseño exacto
          BG_COLOR="0D1117"
          TITLE_COLOR="58A6FF"
          TEXT_COLOR="C9D1D9"
          ICON_COLOR="58A6FF"
          THEME="tokyonight"
          
          # 1. Estadísticas Generales
          curl -o stats-images/general-stats.svg "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=${THEME}&hide_border=true&bg_color=${BG_COLOR}&title_color=${TITLE_COLOR}&icon_color=${ICON_COLOR}&text_color=${TEXT_COLOR}"
          
          # 2. Lenguajes más usados
          curl -o stats-images/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&theme=${THEME}&hide_border=true&bg_color=${BG_COLOR}&title_color=${TITLE_COLOR}&text_color=${TEXT_COLOR}"
          
          # 3. Racha de Commits (Streak)
          curl -o stats-images/streak-stats.svg "https://github-readme-streak-stats.herokuapp.com/?user=${{ github.repository_owner }}&theme=${THEME}&hide_border=true&background=${BG_COLOR}&stroke=${TITLE_COLOR}&ring=${TITLE_COLOR}&fire=FF6B6B&currStreakLabel=${TITLE_COLOR}&sideNums=${TEXT_COLOR}&sideLabels=${TEXT_COLOR}&dates=${TEXT_COLOR}"
          
          # 4. Gráfico de Actividad
          curl -o stats-images/activity-graph.svg "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=tokyo-night&hide_border=true&bg_color=${BG_COLOR}&color=${TITLE_COLOR}&line=${TITLE_COLOR}&point=FFFFFF"

      - name: Guardar imágenes en el repositorio
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualizar imágenes de estadísticas por push"
          file_pattern: "stats-images/*.svg"
          branch: master